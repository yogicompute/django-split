{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="card" style="max-width:420px;margin:40px auto;">
    <h2>Create an account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        {% endfor %}
        <button class="btn" style="margin-top:16px;width:100%;" type="submit">Sign up</button>
    </form>
    <p class="muted" style="margin-top:12px;">Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
</div>
{% endblock %}
