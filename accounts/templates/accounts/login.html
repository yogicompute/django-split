{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:40px auto;">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Username</label>
        {{ form.username }}
        <label>Password</label>
        {{ form.password }}
        <button class="btn" style="margin-top:16px;width:100%;" type="submit">Log in</button>
    </form>
    <p class="muted" style="margin-top:12px;">No account? <a href="{% url 'accounts:signup' %}">Sign up</a></p>
</div>
{% endblock %}
