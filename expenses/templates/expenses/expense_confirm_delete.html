{% extends "base.html" %}
{% block title %}Delete expense{% endblock %}
{% block content %}
<h1>Delete expense</h1>
<div class="card">
    <p>Are you sure you want to delete "<strong>{{ expense.description }}</strong>" ({{ expense.date }}, ₹{{ expense.amount_inr }})?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn danger" type="submit">Delete</button>
        <a class="btn secondary" href="{% url 'expenses:expense_detail' group.pk expense.id %}">Cancel</a>
    </form>
</div>
{% endblock %}
