{% extends "base.html" %}
{% block title %}New group{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
    <h2>Create a group</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        {% endfor %}
        <button class="btn" style="margin-top:16px;" type="submit">Create</button>
    </form>
</div>
{% endblock %}
