services:
  - type: web
    name: splitwise-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,*.onrender.com
  
  - type: pserv
    name: splitwise-db
    env: postgres
    plan: free
    ipAllowList: [] # Allow all IPs
